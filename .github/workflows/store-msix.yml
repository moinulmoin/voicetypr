name: Store MSIX

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/store-msix.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/build-msix-store.ps1'
      - 'scripts/ensure-ffmpeg-sidecar.cjs'
      - 'src-tauri/**'
      - 'sidecar/ffmpeg/**'
      - 'sidecar/whisper-vulkan/**'
      # Keep frontend changes in scope; Store package startup/updater behavior is UI-driven too.
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-store-msix:
    name: Build Store MSIX
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: 'D:\cargo-target'
      RUST_BACKTRACE: 1
      VULKAN_RUNTIME_VERSION: 1.3.290.0
      WINAPPCLI_VERSION: v0.3.2
      WINAPPCLI_X64_SHA256: 231373a4605ce7749172a70534ebab9305f91116e7f68d25cc73051372a6c579
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Setup pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        shell: pwsh
        run: |
          "path=$(pnpm store path --silent)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup WinApp CLI
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "winappcli-x64.zip"
          $toolRoot = Join-Path $env:RUNNER_TOOL_CACHE "winappcli\$env:WINAPPCLI_VERSION\x64"
          $downloadUrl = "https://github.com/microsoft/WinAppCli/releases/download/$env:WINAPPCLI_VERSION/winappcli-x64.zip"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archive
          $actualHash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:WINAPPCLI_X64_SHA256) {
            throw "WinApp CLI SHA-256 mismatch: expected $env:WINAPPCLI_X64_SHA256, got $actualHash"
          }

          Remove-Item $toolRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $toolRoot | Out-Null
          Expand-Archive -Path $archive -DestinationPath $toolRoot -Force

          $winapp = Get-ChildItem -Path $toolRoot -Recurse -Filter winapp.exe | Select-Object -First 1
          if (-not $winapp) {
            throw "winapp.exe not found in WinApp CLI archive"
          }

          $winapp.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare cargo target dir
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:CARGO_TARGET_DIR | Out-Null

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: |
            src-tauri
            sidecar/whisper-vulkan

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify WinApp CLI
        shell: pwsh
        run: winapp --help

      - name: Build and pack Store MSIX
        shell: pwsh
        run: pnpm windows:store:msix

      - name: Assert CPU build does not import vulkan-1.dll
        shell: pwsh
        run: |
          & ./src-tauri/windows/assert-no-vulkan-import.ps1 -ExePath "$env:CARGO_TARGET_DIR\release\voicetypr.exe"

      - name: Upload Store MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: store-msix-windows-x64
          path: |
            target/store-msix/*.msix
            target/store-msix/stage/Package.appxmanifest
          retention-days: 7
